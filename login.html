  <style>
    /* ---------- IIT‑LEVEL DESIGN SYSTEM ---------- */
    * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1a2f;
      color: #ffffff;
      transition: background 0.2s ease, color 0.2s;
      font-weight: 400;
      line-height: 1.5;
    }
    body.dark {
      background: #030e17;
      color: #eef5ff;
    }

    /* 🧊 PREMIUM GLASS – frosted with depth */
    .glass-iit {
      background: rgba(15, 30, 45, 0.65);
      backdrop-filter: blur(18px) saturate(200%);
      -webkit-backdrop-filter: blur(18px) saturate(200%);
      border: 1px solid rgba(45, 212, 191, 0.18);
      border-radius: 32px;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.45);
      transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    .dark .glass-iit {
      background: rgba(5, 18, 28, 0.8);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    /* ✨ EMERALD + SOFT PURPLE GLOW (hover) */
    .hover-premium {
      transition: all 0.2s ease;
    }
    .hover-premium:hover {
      box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.5), 0 0 30px 8px rgba(192, 132, 252, 0.45);
      transform: translateY(-5px);
      border-color: rgba(45,212,191,0.6);
    }

    /* 💧 RIPPLE – smooth, professional */
    .ripple-iit {
      position: relative;
      overflow: hidden;
    }
    .ripple-iit:after {
      content: "";
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 10%, transparent 10.01%);
      background-repeat: no-repeat;
      background-position: 50%;
      transform: scale(12,12);
      opacity: 0;
      transition: transform .4s, opacity .6s;
      pointer-events: none;
    }
    .ripple-iit:active:after {
      transform: scale(0,0);
      opacity: 0.3;
      transition: 0s;
    }

    /* 🎯 COUNTER – gradient digit */
    .counter-iit {
      font-feature-settings: "tnum";
      font-weight: 800;
      background: linear-gradient(145deg, #e2f3fc, #c6f7ed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .dark .counter-iit {
      background: linear-gradient(145deg, #b4f0e6, #9ee2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 📜 custom scroll – IIT subtle */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(45,212,191,0.05); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2dd4bf; border-radius: 10px; }

    /* ⏳ loader */
    .spinner-iit {
      border: 3px solid rgba(45,212,191,0.15);
      border-top: 3px solid #2dd4bf;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 🎭 login float */
    @keyframes floatIIT {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .float-iit { animation: floatIIT 7s infinite ease-in-out; }

    /* 🔵 online pulsing dot */
    .pulse-iit {
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
      animation: pulse-iit 2s infinite;
    }
    @keyframes pulse-iit {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }

    /* mobile refinement */
    @media (max-width: 640px) {
      .glass-iit { border-radius: 26px; }
    }

    /* book cover placeholder – elegant gradient */
    .book-cover-iit {
      background: linear-gradient(145deg, #1d4a5f, #103141);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
  </style>

  // ---------- SMOOTH COUNTER (RAF) ----------
  function animateCounter(el, target, duration = 1000) {
    if (!el) return;
    let current = 0, inc = target / (duration / 16), timer;
    const frame = () => {
      current += inc;
      if (current >= target) { el.innerText = target; cancelAnimationFrame(timer); return; }
      el.innerText = Math.floor(current);
      timer = requestAnimationFrame(frame);
    };
    timer = requestAnimationFrame(frame);
  }

            <a href="#recent" class="glass-iit p-7 hover-premium ripple-iit flex flex-col">

            <a href="#analytics" class="glass-iit p-7 hover-premium ripple-iit flex flex-col row-span-1">
              <div class="flex items-center gap-3"><i class="fas fa-chart-simple text-emerald-400 text-3xl"></i><span class="text-sm bg-emerald-800/50 px-3 py-1.5 rounded-full font-mono">+5s live</span></div>

  function renderDashboardCounters() {
    animateCounter(document.getElementById('totalBooksCounter'), getTotalBooks(), 600);
    animateCounter(document.getElementById('ebooksCounter'), getEbooksCount(), 600);

  // ---------- ALL BOOKS – FULL SEARCH, FILTER, PAGINATION (IIT) ----------
  function renderBooksPage() {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 overflow-auto"><div class="flex justify-center mt-20"><div class="spinner-iit"></div></div></main></div>`;
    setTimeout(() => {
      let html = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 md:p-9 overflow-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-9">
          <h2 class="text-4xl font-bold bg-gradient-to-r from-emerald-300 to-blue-300 bg-clip-text text-transparent"><i class="fas fa-book mr-4"></i>All Books</h2>
          <div class="flex gap-4 mt-4 md:mt-0 w-full md:w-auto">
            <input type="text" id="bookSearch" placeholder="Search by title, author..." class="bg-white/10 border border-white/20 p-4 rounded-2xl w-full md:w-72 text-white placeholder:text-white/40 focus:ring-2 focus:ring-emerald-400 outline-none text-lg">
            <select id="catFilter" class="bg-white/10 border border-white/20 p-4 rounded-2xl text-white focus:ring-2 focus:ring-emerald-400 outline-none text-lg">
              <option value="" class="bg-[#0a1a2f]">All categories</option>
              <option class="bg-[#0a1a2f]">AI</option><option class="bg-[#0a1a2f]">Engineering</option><option class="bg-[#0a1a2f]">Science</option><option class="bg-[#0a1a2f]">CS</option>
            </select>
          </div>
        </div>
        <div id="bookGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-7"></div>
        <div id="paginationControls" class="mt-12 flex justify-center gap-3"></div>
      </main></div>`;
      app.innerHTML = html;
      const grid = document.getElementById('bookGrid');
      let filtered = [];
      const renderBooks = (page = 1) => {
        const search = document.getElementById('bookSearch')?.value.toLowerCase() || '';
        const cat = document.getElementById('catFilter')?.value || '';
        filtered = DB.books.filter(b => 
          (b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search)) && 
          (cat ? b.category === cat : true)
        );
        const perPage = 6, start = (page-1)*perPage, paginated = filtered.slice(start, start+perPage);
        grid.innerHTML = paginated.map(b => `
          <div class="glass-iit p-6 flex gap-5 items-start hover-premium transition">
            <div class="book-cover-iit w-20 h-24 text-5xl">${b.cover}</div>
            <div class="flex-1">
              <h3 class="font-bold text-white text-xl">${b.title}</h3>
              <p class="text-white/60 text-md">${b.author}</p>
              <span class="inline-block mt-2 text-sm px-3 py-1.5 bg-emerald-900/50 rounded-full ${b.availability?'text-emerald-300':'text-amber-400'}">${b.availability?'available':'on hold'}</span>
              <button class="mt-4 text-sm bg-emerald-800/70 px-5 py-2.5 rounded-full hover:bg-emerald-700 transition font-medium">View details →</button>
            </div>
          </div>
        `).join('');
        let pages = Math.ceil(filtered.length/perPage);
        let pgHtml = '';
        for (let i=1; i<=pages; i++) pgHtml += `<button class="px-5 py-3 rounded-xl text-lg font-medium ${page===i?'bg-emerald-700':'bg-white/10'} hover:bg-emerald-800 transition" data-page="${i}">${i}</button>`;
        document.getElementById('paginationControls').innerHTML = pgHtml;
        document.querySelectorAll('#paginationControls button').forEach(btn => btn.addEventListener('click', (e) => { e.preventDefault(); renderBooks(parseInt(e.target.dataset.page)); }));
      };
      renderBooks(1);
      document.getElementById('bookSearch')?.addEventListener('input', () => renderBooks(1));
      document.getElementById('catFilter')?.addEventListener('change', () => renderBooks(1));
    }, 200);
  }

  // ---------- E-BOOKS PAGE (DOWNLOAD, PREVIEW, RATING) ----------
  function renderEbooksPage() {
    const ebooks = DB.books.filter(b => b.type === 'ebook');
    let html = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 md:p-9">
      <h2 class="text-4xl font-bold mb-8"><i class="fas fa-file-pdf text-emerald-400 mr-4"></i>E‑Books (PDF)</h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-7">`;
    ebooks.forEach(b => { html += `
      <div class="glass-iit p-7 flex flex-col hover-premium transition">
        <div class="flex justify-between items-start">
          <span class="font-bold text-2xl text-white">${b.title}</span>
          <span class="bg-amber-800/50 px-4 py-2 rounded-full text-amber-300 text-lg font-semibold flex items-center">⭐ ${b.rating}</span>
        </div>
        <p class="text-white/70 text-lg mt-2">${b.author} • ${b.fileSize}</p>
        <div class="flex gap-4 mt-5 flex-1">
          <button onclick="handleEbookDownload('${b.id}', '${b.title.replace(/'/g, "\\'")}', '${b.type}', '${b.fileSize}')" class="flex-1 bg-emerald-800/80 px-7 py-3 rounded-xl text-lg hover:bg-emerald-700 transition font-semibold cursor-pointer"><i class="fas fa-download mr-2"></i>Download</button>
          <button onclick="handleEbookPreview('${b.id}', '${b.title.replace(/'/g, "\\'")}', '${b.type}', '${b.author}')" class="flex-1 bg-blue-900/60 px-7 py-3 rounded-xl text-lg hover:bg-blue-800/70 transition font-semibold cursor-pointer"><i class="fas fa-eye mr-2"></i>Preview</button>
        </div>
        <p class="text-sm text-white/40 mt-5">📌 Type: ${b.type} | Publisher: ${b.publisher} | Year: ${b.year}</p>
      </div>
    `; });
    html += `</div></main></div>`;
    document.getElementById('app').innerHTML = html;
  }

  function handleEbookDownload(id, title, type, fileSize) {
    const book = getBookById(id);
    alert(`📥 DOWNLOAD INITIATED\n\n📖 Title: ${title}\n👤 Author: ${book.author}\n📦 File Size: ${fileSize}\n🏢 Publisher: ${book.publisher}\n📌 Type: ${type}\n\n✅ Ready to download (${title}.pdf)`);
  }

  function handleEbookPreview(id, title, type, author) {
    const book = getBookById(id);
    alert(`👁️ PREVIEW MODE\n\n📖 Title: ${title}\n👤 Author: ${author}\n📅 Year: ${book.year}\n🏢 Publisher: ${book.publisher}\n⭐ Rating: ${book.rating}\n📌 Type: ${type}\n\n📖 Previewing first 50 pages...`);
  }

        <h2 class="text-4xl font-bold"><i class="fas fa-scroll mr-4"></i>Journals</h2>
        <select id="journalCatIIT" class="bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-lg mt-3 md:mt-0 focus:ring-2 focus:ring-emerald-400">

            <span class="font-semibold text-2xl text-white">${j.title}</span>
            <div class="text-white/60 text-lg mt-1">ISSN ${j.issn} • ${j.publisher} • ${j.year}</div>

  // ---------- ACTIVE USERS (ROLE BASED) ----------
  function renderActiveUsersPage() {

  // ---------- TRENDING PAGE ----------

  // ---------- RECENT ACTIVITY PAGE ----------
  function renderRecentPage() {
    const rec = getUserRecent(currentUser.id);
    let html = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 md:p-9">
      <h2 class="text-4xl font-bold mb-8"><i class="fas fa-clock mr-4"></i>My recent activity</h2>
      <div class="space-y-5">`;
    if (rec.length===0) html += `<div class="glass-iit p-12 text-center text-white/50 text-2xl">No recent activity</div>`;
    else rec.forEach(r => { const b = getBookById(r.bookId); html += `
      <div class="glass-iit p-6 flex justify-between items-center">
        <div>
          <span class="font-bold text-2xl text-white">${b?.title}</span>
          <p class="text-white/60 text-lg">${r.accessedAt} • ${r.timeSpent} min • ${r.downloaded?'⬇️ downloaded':'👁️ viewed'}</p>
        </div>
        <button class="text-rose-400/80 hover:text-rose-400 text-xl"><i class="fas fa-trash-alt mr-2"></i>remove</button>
      </div>
    `; });
    html += `</div></main></div>`;
    document.getElementById('app').innerHTML = html;
  }

  // ---------- ANALYTICS (LIVE 5S) ----------
  function renderAnalyticsPage() {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 md:p-9">
      <h2 class="text-4xl font-bold mb-9"><i class="fas fa-chart-line mr-4"></i>Analytics · live stream (5s)</h2>
      <div class="grid lg:grid-cols-2 gap-8">
        <div class="glass-iit p-6"><canvas id="lineDailyIIT" style="height:240px; width:100%;"></canvas></div>
        <div class="glass-iit p-6"><canvas id="barMonthlyIIT" style="height:240px; width:100%;"></canvas></div>
        <div class="glass-iit p-6 lg:col-span-2"><canvas id="pieCategoryIIT" style="height:260px; width:100%;"></canvas></div>
      </div>
    </main></div>`;
    setTimeout(() => {
      const line = document.getElementById('lineDailyIIT')?.getContext('2d');
      const bar = document.getElementById('barMonthlyIIT')?.getContext('2d');
      const pie = document.getElementById('pieCategoryIIT')?.getContext('2d');
      if (line) window.dailyChart = new Chart(line, { type: 'line', data: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets: [{ label: 'daily visits', data: [82,94,108,125,148,139,172], borderColor: '#2dd4bf', backgroundColor: '#2dd4bf20', tension: 0.3, borderWidth: 3 }] }, options: { responsive: true, maintainAspectRatio: true } });
      if (bar) window.monthlyChart = new Chart(bar, { type: 'bar', data: { labels: ['Jan','Feb','Mar','Apr'], datasets: [{ label: 'downloads', data: [520,610,730,890], backgroundColor: '#818cf8', borderRadius: 8 }] } });
      if (pie) window.pieChart = new Chart(pie, { type: 'pie', data: { labels: ['AI','Engineering','Science','CS'], datasets: [{ data: [44,26,18,12], backgroundColor: ['#2dd4bf','#818cf8','#f472b6','#fbbf24'] }] } });
    }, 80);
    setInterval(() => { 
      if (activeRoute === 'analytics' && window.dailyChart) {
        window.dailyChart.data.datasets[0].data = window.dailyChart.data.datasets[0].data.map(v => v + Math.floor(Math.random()*7-2));
        window.dailyChart.update();
        window.monthlyChart.data.datasets[0].data = window.monthlyChart.data.datasets[0].data.map(v => v + Math.floor(Math.random()*15-5));
        window.monthlyChart.update();
      }
    }, 5000);
  }

  // ---------- UPLOAD (FACULTY ONLY) ----------
  function renderUploadPage() {
    if (currentUser?.role !== 'faculty') { renderDashboard(); return; }
    document.getElementById('app').innerHTML = `<div class="flex w-full">${renderSidebar()}<main class="flex-1 p-7 md:p-9">
      <div class="glass-iit max-w-3xl p-9 mx-auto">
        <h2 class="text-3xl font-bold mb-7"><i class="fas fa-cloud-upload-alt mr-3 text-emerald-400"></i>Upload academic resource</h2>
        <div class="space-y-5">
          <input placeholder="Title" class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-xl placeholder:text-white/40 focus:ring-2 focus:ring-emerald-400">
          <input placeholder="Author(s)" class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-xl placeholder:text-white/40">
          <select class="w-full bg-white/10 border border-white/20 p-4 rounded-2xl text-white text-xl">
            <option class="bg-[#0a1a2f]">E-Book</option>
            <option class="bg-[#0a1a2f]">Journal</option>
            <option class="bg-[#0a1a2f]">Conference paper</option>
          </select>
          <button class="w-full bg-emerald-700 hover:bg-emerald-600 py-5 rounded-2xl text-2xl font-semibold transition shadow-xl">Publish resource</button>
        </div>
      </div>
    </main></div>`;
  }

  // ---------- DARK MODE ----------
  function attachDarkToggle() {
    document.getElementById('darkToggle')?.addEventListener('click', (e) => { e.preventDefault(); document.body.classList.toggle('dark'); });
  }

  // ---------- ROUTER ----------
  function renderRoute(route) {
    if (!currentUser && route !== 'login') { window.location.hash = 'login'; renderLogin(); return; }
    activeRoute = route;
    if (route === 'login') renderLogin();
    else if (route === 'dashboard') renderDashboard();
    else if (route === 'books') renderBooksPage();
    else if (route === 'ebooks') renderEbooksPage();
    else if (route === 'journals') renderJournalsPage();
    else if (route === 'active-users') renderActiveUsersPage();
    else if (route === 'trending') renderTrendingPage();
    else if (route === 'recent') renderRecentPage();
    else if (route === 'analytics') renderAnalyticsPage();
    else if (route === 'upload') renderUploadPage();
    else if (route === 'logout') { sessionStorage.removeItem('iit_smartlib'); currentUser = null; window.location.hash = 'login'; renderLogin(); }
    else renderDashboard();
  }

  window.addEventListener('load', () => { if (!window.location.hash) window.location.hash = currentUser ? 'dashboard' : 'login'; renderRoute(window.location.hash.slice(1)); });
  window.addEventListener('hashchange', () => renderRoute(window.location.hash.slice(1)));
</script>
